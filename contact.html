    <title>Contact Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assest/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">مشروعي</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">الرئيسية</a></li>

                </ul>
            </div>
        </div>
    </nav>

    <hr>

    <main>
        <h2>Contact Us</h2>

        <!-- id="contactForm" used by JS validation -->
        <form id="contactForm" class="p-4 shadow-sm bg-white rounded">
            <div class="mb-3">
                <label class="form-label">الاسم الكامل:</label>
                <input type="text" class="form-control" placeholder="أدخل اسمك هنا">
            </div>
            <div class="mb-3">
                <label class="form-label">البريد الإلكتروني:</label>
                <input type="email" class="form-control" placeholder="name@example.com">
            </div>
            <div class="mb-3">
                <label class="form-label">رسالتك:</label>
                <textarea class="form-control" rows="4" placeholder="كيف يمكننا مساعدتك؟"></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">إرسال الرسالة</button>
        </form>

        <!-- this div is hidden at first, JS will show it with the right message -->
        <div id="formMsg" style="display:none;"></div>

        <hr>

        <h2>Contact Information</h2>
        <p><b>Phone:</b> +963 934 657 898</p>
        <p><b>Email:</b> svu@example.com</p>

        <h3>Find Us Online</h3>
        <p><b>Facebook:</b> Syria Events</p>
        <p><b>Instagram:</b> Syria Events</p>
        <p><b>Snapchat:</b> Syria Events</p>
    </main>

    <hr>

    <footer>
